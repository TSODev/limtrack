<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>LimTrack</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4f46e5" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LimTrack" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Android -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- SEO -->
    <meta name="description" content="Gérez vos contrats LOA et assurance, suivez vos kilométrages et recevez des alertes avant de dépasser vos limites." />

    <link data-trunk rel="css" href="style/output.css" />
    <style>
        html { background-color: #ffffff; }
        body { overscroll-behavior-y: none; }
        /* Par défaut : safe area CSS native */
        :root { --nav-top: env(safe-area-inset-top); }
        /* En contexte Tauri iOS : minimum 44px pour couvrir Dynamic Island */
        .tauri-ios { --nav-top: max(env(safe-area-inset-top), 44px); }
    </style>
    <script>
        /* Tauri injecte __TAURI__ de façon synchrone avant le parsing DOM */
        if (typeof __TAURI__ !== 'undefined') {
            document.documentElement.classList.add('tauri-ios');
        }
    </script>

    <!-- Fichiers statiques copiés vers dist/ -->
    <link data-trunk rel="copy-file" href="public/_redirects" />
    <link data-trunk rel="copy-file" href="public/manifest.json" />
    <link data-trunk rel="copy-dir" href="public/icons" />
</head>

<body></body>

</html>
